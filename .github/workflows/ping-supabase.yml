name: Ping quotidien Supabase

# Empeche la mise en pause du projet Supabase free tier.
# Ne fait rien tant que les secrets SUPABASE_URL / SUPABASE_ANON_KEY
# ne sont pas configures dans le depot.

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets Supabase absents : ping ignore."
            exit 0
          fi
          # Le secret peut contenir un chemin (ex. .../rest/v1/) : on ne garde
          # que l'origine pour construire l'URL.
          ORIGIN=$(printf '%s' "$SUPABASE_URL" | sed -E 's#^(https?://[^/]+).*#\1#')
          # Endpoint de sante GoTrue : repond 200 avec la seule cle anon, et
          # suffit a marquer le projet comme actif.
          curl --fail --silent --show-error \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$ORIGIN/auth/v1/health" > /dev/null
          echo "Ping Supabase OK."
