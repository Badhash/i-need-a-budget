name: Deploiement GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Installer les dependances
        working-directory: app
        run: npm ci
      # Sans ces secrets, le front se construit avec des valeurs placeholder
      # (https://placeholder.supabase.co) : le login echoue avec un CORS Failed
      # trompeur. On echoue tot et clairement plutot que de deployer un front casse.
      - name: Verifier la configuration Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Secrets SUPABASE_URL et/ou SUPABASE_ANON_KEY absents. Ajoute-les dans Settings > Secrets and variables > Actions, puis relance ce workflow."
            exit 1
          fi
      - name: Build
        working-directory: app
        run: npm run build
        env:
          # Valeurs publiques (embarquees dans le bundle) : la cle anon ne donne
          # aucun acces aux tables (RLS + revoke). Definir ces secrets dans
          # Settings > Secrets and variables > Actions.
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
